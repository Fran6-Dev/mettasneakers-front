<div class="container">
  <h2>{{ isEditMode ? 'Modifier le produit' : 'Ajouter un produit' }}</h2>

  @if (error) {
    <div class="error">{{ error }}</div>
  }

  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Nom</label>
      <input type="text" [(ngModel)]="product.name" name="name" required />
    </div>

    <div class="form-group">
      <label>Marque</label>
      <input type="text" [(ngModel)]="product.brand" name="brand" required />
    </div>

    <div class="form-group">
      <label>Prix (€)</label>
      <input type="number" [(ngModel)]="product.price" name="price" required />
    </div>

    <div class="form-group">
      <label>Taille</label>
      <input type="string" [(ngModel)]="product.size" name="size" required />
    </div>

    <div class="form-group">
      <label>Stock</label>
      <input type="number" [(ngModel)]="product.stock" name="stock" required />
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea [(ngModel)]="product.description" name="description"></textarea>
    </div>

    <div class="form-group">
      <label>Catégorie</label>
      <select [(ngModel)]="product.category" name="category">
        @for (cat of categories; track cat) {
          <option [value]="cat">{{ cat }}</option>
        }
      </select>
    </div>

    <div class="form-actions">
      <button type="button" (click)="goBack()">Annuler</button>
      <button type="submit">{{ isEditMode ? 'Modifier' : 'Ajouter' }}</button>
    </div>
  </form>
</div>
